{% extends "base.html" %}
{% block title %}New task · Arc Connect Portal{% endblock %}
{% block body %}
<div class="page">
  <div class="page-header">
    <div>
      <a href="{{ url_for('tasks') }}" class="btn btn-sm">← Back</a>
      <h1 class="mt-2">New task</h1>
      <div class="subtitle">Track follow-up work — can link to a patient and/or an alert</div>
    </div>
  </div>

  <div class="card">
    <form method="POST" class="card-body">
      <div class="form-grid">
        <div class="form-group span-2">
          <label>Title</label>
          <input type="text" name="title" required list="titleTemplates" placeholder="e.g. Call patient about missed therapy">
          <datalist id="titleTemplates">
            {% for t in templates %}<option value="{{ t }}">{% endfor %}
          </datalist>
          <div class="help">Start typing for common templates.</div>
        </div>
        <div class="form-group span-2">
          <label>Description</label>
          <textarea name="description" rows="3" placeholder="What needs to happen? Any context?"></textarea>
        </div>
        <div class="form-group">
          <label>Patient (optional)</label>
          <select name="patient_id">
            <option value="">— none / general —</option>
            {% for p in patients %}
              <option value="{{ p.id }}" {% if prefill_patient_id == p.id %}selected{% endif %}>{{ p.last_name }}, {{ p.first_name }} ({{ p.mrn }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select name="priority">
            <option value="high">High</option>
            <option value="normal" selected>Normal</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Assign to</label>
          <select name="assigned_to_user_id">
            {% for u in users %}
              <option value="{{ u.id }}" {% if u.id == current_user.id %}selected{% endif %}>{{ u.last_name }}, {{ u.first_name }} ({{ u.role | replace('_',' ') | title }}){% if u.id == current_user.id %} — me{% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Due by</label>
          <input type="datetime-local" name="due_at">
          <div class="help">Leave blank for no deadline.</div>
        </div>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('tasks') }}" class="btn">Cancel</a>
        <button type="submit" class="btn btn-primary">Create task</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
